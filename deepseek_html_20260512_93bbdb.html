function formatNumber(num) { return (num || 0).toLocaleString('ru-RU'); }
function parseNumber(str) { return parseInt(str.replace(/[^\d]/g, '')) || 0; }
function escapeHTML(s) { return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function playSound() { try { let ctx = new (window.AudioContext || window.webkitAudioContext)(); let o = ctx.createOscillator(); let g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.value = 0.08; o.type = 'sine'; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3); o.stop(ctx.currentTime + 0.3); if(ctx.state === 'suspended') ctx.resume(); } catch(e) {} }
function showNotification(msg) { let n = document.createElement('div'); n.className='notification'; n.innerText=msg; document.body.appendChild(n); setTimeout(()=>n.remove(), 2000); }
function getKey(a,b) { return [a,b].sort().join('_'); }
function copyUserKey() { let key = users[currentUser]?.secretKey; if(key) navigator.clipboard.writeText(key); showNotification("🔑 Ключ скопирован"); }

function openPrivacyPolicy() {
    let modal = document.createElement('div'); modal.className='privacy-panel';
    modal.innerHTML = `<div class="privacy-content"><h2>📋 ПОЛИТИКА КОНФИДЕНЦИАЛЬНОСТИ</h2>

// ========== СМЕНА АВАТАРА ==========
function changeAvatarFromGallery() {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = ev => {
                users[currentUser].avatar = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                localStorage.setItem("BetaMessenger_users", JSON.stringify(users));
                fullRefresh();
                showNotification("✅ Аватар обновлён!");
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

function refreshStickerPacksList() {
    let userPacks = Object.entries(stickerPacks).filter(([id, pack]) => pack.owner === currentUser);
    let container = document.getElementById('userStickerPacks');
    if(!container) return;
    container.innerHTML = '';
    userPacks.forEach(([id, pack]) => {
        let div = document.createElement('div'); div.className='sticker-pack';
        div.innerHTML = `<div style="display:flex; justify-content:space-between;"><b>${escapeHTML(pack.name)}</b><button onclick="deleteStickerPack('${id}')">🗑️</button></div>
        <div class="sticker-grid" id="grid-${id}"></div>
        <button onclick="addStickerToPack('${id}')" style="margin-top:8px;">➕ Добавить эмодзи</button>
        <button onclick="addPhotoStickerToPack('${id}')" style="margin-top:8px;">📸 Добавить фото</button>`;
        let grid = div.querySelector(`.sticker-grid`);
        (pack.stickers || []).forEach((sticker, idx) => {
            let stickerDiv = document.createElement('div'); stickerDiv.className='sticker-item';
            if(sticker.startsWith('<img')) stickerDiv.innerHTML = sticker;
            else stickerDiv.innerHTML = `<span style="font-size:32px;">${sticker}</span>`;
            let delBtn = document.createElement('div'); delBtn.className='sticker-delete'; delBtn.innerHTML = '✕'; delBtn.onclick = (e) => { e.stopPropagation(); removeSticker(id, idx); };
            stickerDiv.appendChild(delBtn);
            grid.appendChild(stickerDiv);
        });
        container.appendChild(div);
    });
}
function createStickerPack() { let name = prompt("Название набора:"); if(name) { let id = 'pack_' + Date.now(); stickerPacks[id] = { owner: currentUser, name: name, stickers: [] }; localStorage.setItem("BetaMessenger_stickers", JSON.stringify(stickerPacks)); refreshStickerPacksList(); showNotification("✅ Набор создан!"); } }
function deleteStickerPack(packId) { if(confirm("Удалить набор?")) { delete stickerPacks[packId]; localStorage.setItem("BetaMessenger_stickers", JSON.stringify(stickerPacks)); refreshStickerPacksList(); showNotification("✅ Набор удалён"); } }
function addStickerToPack(packId) { let emoji = prompt("Введите эмодзи:"); if(emoji) { stickerPacks[packId].stickers.push(emoji); localStorage.setItem("BetaMessenger_stickers", JSON.stringify(stickerPacks)); refreshStickerPacksList(); showNotification("✅ Стикер добавлен!"); } }
function addPhotoStickerToPack(packId) {
    let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = ev => {
                let imgHtml = `<img src="${ev.target.result}" style="width:50px; height:50px; object-fit:cover; border-radius:12px;">`;
                stickerPacks[packId].stickers.push(imgHtml);
                localStorage.setItem("BetaMessenger_stickers", JSON.stringify(stickerPacks));
                refreshStickerPacksList();
                showNotification("✅ Фото-стикер добавлен!");
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}
function removeSticker(packId, index) { stickerPacks[packId].stickers.splice(index, 1); localStorage.setItem("BetaMessenger_stickers", JSON.stringify(stickerPacks)); refreshStickerPacksList(); showNotification("✅ Стикер удалён"); }
function toggleStickerPanel() { if(!users[currentUser]?.premium) { showNotification("💎 Стикеры доступны только с премиум"); return; } let panel = document.getElementById('stickerPanel'); if(panel.style.display === 'none') { panel.style.display = 'flex'; loadStickersToPanel(); } else panel.style.display = 'none'; }
function loadStickersToPanel() {
    let panel = document.getElementById('stickerPanel');
    panel.innerHTML = '';
    let userPacks = Object.entries(stickerPacks).filter(([id, pack]) => pack.owner === currentUser);
    userPacks.forEach(([id, pack]) => {
        (pack.stickers || []).forEach(sticker => {
            let stickerDiv = document.createElement('div');
            stickerDiv.className = 'sticker';
            stickerDiv.innerHTML = sticker;
            stickerDiv.onclick = () => sendSticker(sticker);
            panel.appendChild(stickerDiv);
        });
    });
    if(userPacks.length === 0 || (userPacks.length > 0 && userPacks.every(p => p[1].stickers.length === 0))) panel.innerHTML = '<div style="color:#aaa;">Нет стикеров, создайте набор в настройках</div>';

function sendSticker(stickerHtml) { if(!currentChat) { showNotification("Выберите чат"); return; } let key = getKey(currentUser, currentChat); if(!privateChats[key]) privateChats[key] = []; privateChats[key].push({ id: Date.now() + '_' + Math.random(), sender: currentUser, sticker: stickerHtml, type: 'sticker', time: Date.now() }); localStorage.setItem("BetaMessenger_chats", JSON.stringify(privateChats)); fullRefresh(); playSound(); document.getElementById('stickerPanel').style.display = 'none'; }

function applyPromoCode(code) {
    let u = users[currentUser];
    let success = false;
    switch(code) {
        case 'free': u.wallet = (u.wallet||0) + 500; success = true; showNotification("🎁 +500 CATS!"); break;
        case 'dddima': if(!u.boughtBackgrounds?.includes('dddima')) { if(!u.boughtBackgrounds) u.boughtBackgrounds = []; u.boughtBackgrounds.push('dddima'); success = true; showNotification("✅ Фон DDDIMA получен!"); } else showNotification("Уже есть"); break;
        case 'prem': if(!u.premium) { u.premium = true; success = true; showNotification("💎 Премиум активирован!"); } else showNotification("Премиум уже есть"); break;
        case 'dev': if(!u.isTester) { u.isTester = true; u.isDev = true; success = true; showNotification("🔧 Статус тестера!"); } else showNotification("Уже есть"); break;
        case 'frank': if(!u.hasFrank) { u.hasFrank = true; success = true; showNotification("🎭 Стикер Фрэнка активирован!"); } else showNotification("Уже есть"); break;
        case 'admin': if(!u.isAdmin) { u.isAdmin = true; success = true; showNotification("🔓 Админ-панель разблокирована!"); } else showNotification("Вы уже админ"); break;
        default: showNotification("❌ Неверный код");
    }
    if(success) { localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); fullRefresh(); }
}

// ========== БАНК (с магазином фонов) ==========
function openBankWindow() {
    if(bankWindow) { bankWindow.style.display='flex'; refreshBankContent(); return; }
    let win = document.createElement('div'); win.className='bank-window'; win.id='bankWindow';
    win.innerHTML = `<div class="bank-header" id="bankHeader"><span>🏦 Cat-Bank / ${currentUser}</span><div><span id="minimizeBankBtn" style="cursor:pointer; margin-right:15px;">➖</span><span id="closeBankBtn" style="cursor:pointer;">✕</span></div></div><div class="bank-body" id="bankBody"></div>`;
    document.body.appendChild(win); bankWindow=win;
    document.getElementById('closeBankBtn').onclick = () => bankWindow.style.display='none';
    document.getElementById('minimizeBankBtn').onclick = () => bankWindow.style.display='none';
    let header = win.querySelector('#bankHeader');
    let isDrag=false, sx,sy,l,t;
    header.onmousedown = (e) => { if(e.target===header||header.contains(e.target)) { isDrag=true; sx=e.clientX; sy=e.clientY; l=win.offsetLeft; t=win.offsetTop; win.style.cursor='grabbing'; e.preventDefault(); } };
    window.onmousemove = (e) => { if(isDrag) { win.style.left=(l+e.clientX-sx)+'px'; win.style.top=(t+e.clientY-sy)+'px'; } };
    window.onmouseup = () => { isDrag=false; win.style.cursor='default'; };
    win.style.display='flex'; refreshBankContent();
}
function refreshBankContent() {
    let user = users[currentUser];
    if(!user) return;
    document.getElementById('bankBody').innerHTML = `
        <div class="bank-card"><div>💳 CATS CARD</div><div class="btc-rate" style="font-size:22px;">1 BTC = ${100 + Math.floor((user.bitcoinCoins||0)*2)} CATS</div><div style="font-size:32px; font-weight:bold; color:#fbbf24;">${formatNumber(user.wallet)} CATS</div></div>
        <div><h3>⛏️ МАЙНИНГ</h3>${!user.hasMiner ? `<button class="bank-action-btn" onclick="buyMiner()">💰 Купить майнер за 500 CATS</button>` : `<div class="mining-progress" style="height:8px; background:#2a3a5a; border-radius:4px; overflow:hidden;"><div class="mining-fill" style="width:${((user.bitcoin||0)%1)*100}%; height:100%; background:linear-gradient(90deg,#fbbf24,#ff8c00); transition:width 0.3s;"></div></div><div>₿ ${(user.bitcoin||0).toFixed(4)} BTC | 💰 Coins: ${user.bitcoinCoins||0}</div><button class="bank-action-btn" onclick="exchangeBtcToCats()">💱 Обменять BTC → CATS</button>`}</div>
        <div><h3>📤 ПЕРЕВОД</h3><input id="transferTo" placeholder="Логин получателя" class="bank-input"><input id="transferAmount" placeholder="Сумма" class="bank-input" type="number"><button class="bank-action-btn" onclick="makeTransfer()">💸 Перевести</button></div>
        <div><h3>🎨 МАГАЗИН ФОНОВ</h3><div id="bgShopBank" class="shop-grid"></div></div>
        <div><h3>🎁 ПРОМО-КОД</h3><input id="promoCodeBank" class="bank-input"><button class="bank-action-btn" onclick="applyPromoCodeFromBank()">🎟️ Активировать</button></div>
    `;
    let shopDiv = document.getElementById('bgShopBank');
    backgrounds.forEach(bg => {
        let owned = user.boughtBackgrounds?.includes(bg.id);
        let btn = document.createElement('div'); btn.className='shop-item';
        btn.innerHTML = `<div style="font-size:32px;">${bg.preview}</div><div style="font-size:12px;">${bg.name}</div>${owned ? '✅' : `<button class="bank-action-btn" onclick="buyBackground('${bg.id}')" style="margin-top:6px;">${bg.price>0?formatNumber(bg.price)+' CATS':'ПРОМО'}</button>`}`;
        shopDiv.appendChild(btn);
    });
}
function buyBackground(bgId) {
    let user = users[currentUser];
    let bg = backgrounds.find(b=>b.id===bgId);
    if(!bg || bg.price===0) return;
    if(user.boughtBackgrounds?.includes(bgId)) return showNotification("Уже есть");
    if((user.wallet||0) >= bg.price) {
        user.wallet -= bg.price;
        if(!user.boughtBackgrounds) user.boughtBackgrounds=[];
        user.boughtBackgrounds.push(bgId);
        localStorage.setItem("BetaMessenger_users", JSON.stringify(users));
        fullRefresh();
        if(bankWindow && bankWindow.style.display==='flex') refreshBankContent();
        showNotification(`✅ Куплен фон ${bg.name}!`);
    } else showNotification("Недостаточно CATS");
}
function buyMiner() { let user = users[currentUser]; if(user.hasMiner) return showNotification("Майнер уже есть!"); if((user.wallet||0) >= 500) { user.wallet -= 500; user.hasMiner = true; user.bitcoin = user.bitcoin||0; user.bitcoinCoins = user.bitcoinCoins||0; localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); fullRefresh(); if(bankWindow && bankWindow.style.display==='flex') refreshBankContent(); showNotification("✅ Майнер куплен!"); } else showNotification("❌ Нужно 500 CATS"); }
function exchangeBtcToCats() { let user = users[currentUser]; let coins = user.bitcoinCoins || 0; if(coins>0) { let rate = 100 + Math.floor((user.bitcoinCoins||0)*2); user.wallet = (user.wallet||0) + coins*rate; user.bitcoinCoins = 0; user.bitcoin = 0; localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); fullRefresh(); showNotification(`💱 Обменяно ${coins} BTC → ${formatNumber(coins*rate)} CATS`); if(bankWindow && bankWindow.style.display==='flex') refreshBankContent(); } else showNotification("Нет BTC"); }
function makeTransfer() { let to = document.getElementById('transferTo')?.value.trim(); let amount = parseNumber(document.getElementById('transferAmount')?.value); let user = users[currentUser]; if(!to || !users[to]) return showNotification("Не найден"); if(to === currentUser) return showNotification("Нельзя себе"); if(amount<=0) return showNotification("Сумма >0"); if((user.wallet||0) < amount) return showNotification("Недостаточно"); user.wallet -= amount; users[to].wallet = (users[to].wallet||0) + amount; localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); fullRefresh(); showNotification(`✅ Переведено ${formatNumber(amount)} CATS → ${to}`); if(bankWindow && bankWindow.style.display==='flex') refreshBankContent(); }
function applyPromoCodeFromBank() { let code = document.getElementById('promoCodeBank')?.value.trim().toLowerCase(); if(code) { applyPromoCode(code); if(bankWindow && bankWindow.style.display==='flex') refreshBankContent(); } }

function claimDailyBonus() { let user = users[currentUser]; let last = user.lastBonusDate || 0; let today = new Date().toDateString(); if(last === today) { showNotification("❌ Бонус уже получен!"); return; } let streak = user.bonusStreak || 0; if(last && new Date(last).getTime()+86400000 < Date.now()-86400000) streak=0; streak++; let amount = Math.min(100+streak*50,1000); let extra = 0; if(streak===7) extra=500; if(streak===14) extra=1000; if(streak===30) { extra=3000; if(!user.boughtBorders) user.boughtBorders=[]; if(!user.boughtBorders.includes('neon-purple')) user.boughtBorders.push('neon-purple'); showNotification("🎨 Обводка в подарок!"); } user.wallet = (user.wallet||0) + amount + extra; user.lastBonusDate = today; user.bonusStreak = streak; localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); fullRefresh(); showNotification(`🎁 +${formatNumber(amount+extra)} CATS (стрик ${streak})`); }
function startMining() { if(miningInterval) clearInterval(miningInterval); miningInterval = setInterval(() => { let user = users[currentUser]; if(!user || !user.hasMiner) return; let btc = user.bitcoin || 0; let n = btc + 0.01; if(n >= 0.99) { user.bitcoinCoins = (user.bitcoinCoins||0) + Math.floor(n); n = n - Math.floor(n); } user.bitcoin = parseFloat(n.toFixed(4)); localStorage.setItem("BetaMessenger_users", JSON.stringify(users)); if(bankWindow && bankWindow.style.display === 'flex') refreshBankContent(); }, 1000); }
function openCustomizeModal() { let u = users[currentUser]; let modal = document.createElement('div'); modal.className='modal'; modal.innerHTML = `<div class="modal-content"><h3>🎨 КАСТОМИЗАЦИЯ</h3><div><strong>Фоны:</strong><div id="customBgList" style="display:flex; flex-wrap:wrap; gap:10px; margin:15px 0;"></div></div><div><strong>Обводки:</strong><div id="customBorderList" style="display:flex; flex-wrap:wrap; gap:10px; margin:15px 0;"></div></div><button class="bank-action-btn" onclick="this.closest('.modal').remove()" style="width:auto; padding:10px 20px;">Закрыть</button></div>`; document.body.appendChild(modal); let bgDiv = document.getElementById('customBgList'); backgrounds.forEach(bg => { let owned = u.boughtBackgrounds?.includes(bg.id); let btn = document.createElement('div'); btn.style.cssText='background:#0f141f; border-radius:16px; padding:10px; text-align:center; width:90px;'; btn.innerHTML = `<div style="font-size:28px;">${bg.preview}</div><div>${bg.name}</div>${owned ? `<button onclick="setBackground('${bg.id}');this.closest('.modal').remove()" style="margin-top:5px;">👑 Надеть</button>` : ''}`; bgDiv.appendChild(btn); }); let borderDiv = document.getElementById('customBorderList'); borders.forEach(b => { let owned = u.boughtBorders?.includes(b.id); let btn = document.createElement('div'); btn.style.cssText='background:#0f141f; border-radius:16px; padding:10px; text-align:center; width:90px;'; btn.innerHTML = `<div style="font-size:28px;">${b.preview}</div><div>${b.name}</div>${owned ? `<button onclick="setBorder('${b.id}');this.closest('.modal').remove()" style="margin-top:5px;">👑 Надеть</button>` : ''}`; borderDiv.appendChild(btn); }); }

function renderMessages() { let div = document.getElementById('messages'); if(!currentChat) { div.innerHTML='<div style="text-align:center;">💬 Выберите чат</div>'; return; } let messages = []; if(currentChatType === 'user') messages = privateChats[getKey(currentUser, currentChat)] || []; else messages = groups[currentChat]?.messages || []; div.innerHTML = ''; messages.forEach(m => { let msgDiv = document.createElement('div'); msgDiv.className = `message ${m.sender===currentUser?'me':''}`; let sn = users[m.sender]?.name || m.sender; let content = ''; if(m.type==='photo') content = `<div><b>${escapeHTML(sn)}</b><br><img src="${m.photoData}" style="max-width:180px; border-radius:12px; margin-top:8px; cursor:pointer;" onclick="viewImage('${m.photoData}')"></div>`; else if(m.type==='sticker') { if(m.sticker.includes('<img')) content = `<div class="sticker-message-img">${m.sticker}</div>`; else content = `<div class="sticker-message">${m.sticker}</div>`; } else content = `<div><b>${escapeHTML(sn)}</b><br>${escapeHTML(m.text)}</div>`; msgDiv.innerHTML = `${content}<div style="font-size:10px; margin-top:4px;">${new Date(m.time).toLocaleTimeString()}</div>`; div.appendChild(msgDiv); }); div.scrollTop = div.scrollHeight; }
function updateProfileUI() { let u = users[currentUser]; if(!u) return; document.getElementById('profileAvatar').innerHTML = u.avatar; let bc = u.avatarBorder || ''; let av = document.querySelector('.profile-avatar'); if(av) av.classList.remove('avatar-border-neon-purple','avatar-border-neon-red','avatar-border-neon-pink'); if(bc) av.classList.add(bc); let bgId = u.activeBackground; let bgDiv = document.getElementById('profileBg'); if(bgDiv) { bgDiv.className = 'profile-bg'; if(bgId) bgDiv.classList.add(bgId); } let hidden = u.hiddenBadges || []; let premiumBadge = (!hidden.includes('premium') && u.premium) ? '👑' : ''; let verifiedBadge = (!hidden.includes('verified') && u.verified) ? '✓' : ''; let testerBadge = (!hidden.includes('tester') && u.isTester) ? '<span class="tester-badge">⚙️ Тестер беты</span>' : ''; let devBadge = (!hidden.includes('dev') && u.isDev) ? '<span class="dev-badge">🔧 Dev</span>' : ''; let adminBadge = (!hidden.includes('admin') && u.isAdmin) ? '<span class="admin-badge">👑 Admin</span>' : ''; let frankBadge = (!hidden.includes('frank') && u.hasFrank) ? `<img src="${FRANK_GIF_URL}" style="width:24px; height:24px; border-radius:50%;">` : ''; let customGif = (!hidden.includes('customGif') && u.customGif) ? `<img src="${u.customGif}" style="width:28px; height:28px; border-radius:50%;">` : ''; document.getElementById('profileName').innerHTML = `${escapeHTML(u.name)} ${verifiedBadge} ${premiumBadge} ${testerBadge} ${devBadge} ${adminBadge} ${frankBadge} ${customGif}`; document.getElementById('profileLogin').innerText = '@'+currentUser; document.getElementById('userKey').innerText = u.secretKey; }

${premiumBadge} ${testerBadge} ${devBadge} ${adminBadge} ${frankBadge} ${customGif}</div><div>@${q}</div><div style="color:#fbbf24;">🐱 ${formatNumber(found.wallet||0)}</div></div></div><div style="margin-top:12px;">${btn}<button onclick="viewFriendProfile('${q}')" style="margin-left:10px; padding:6px 12px;">👤 Профиль</button></div></div>`; }
function viewFriendProfile(login) { let u = users[login]; let hidden = users[currentUser]?.hiddenBadges || []; let border = u.avatarBorder ? `box-shadow:0 0 0 3px ${u.avatarBorder.includes('purple')?'#9c54ff':u.avatarBorder.includes('red')?'#ff4444':'#ff69b4'},0 0 12px;` : ''; let premiumBadge = (!hidden.includes('premium') && u.premium) ? '👑' : ''; let verifiedBadge = (!hidden.includes('verified') && u.verified) ? '✓' : ''; let testerBadge = (!hidden.includes('tester') && u.isTester) ? '<div class="tester-badge">⚙️ Тестер беты</div>' : ''; let devBadge = (!hidden.includes('dev') && u.isDev) ? '<div class="dev-badge">🔧 Dev</div>' : ''; let adminBadge = (!hidden.includes('admin') && u.isAdmin) ? '<div class="admin-badge">👑 Admin</div>' : ''; let frankBadge = (!hidden.includes('frank') && u.hasFrank) ? `<img src="${FRANK_GIF_URL}" style="width:28px; height:28px; border-radius:50%; display:inline-block; margin-top:5px;">` : ''; let customGif = (!hidden.includes('customGif') && u.customGif) ? `<img src="${u.customGif}" style="width:28px; height:28px; border-radius:50%; display:inline-block; margin-top:5px;">` : ''; let modal = document.createElement('div'); modal.className='modal'; modal.innerHTML = `<div style="background:#171d2b; padding:24px; border-radius:24px; width:360px; text-align:center;"><div style="font-size:64px; width:100px; height:100px; margin:0 auto; display:flex; align-items:center; justify-content:center; border-radius:50%; ${border}">${u.avatar}</div><h3>${escapeHTML(u.name)}</h3><div>@${login}</div>${verifiedBadge}${premiumBadge}${testerBadge}${devBadge}${adminBadge}${frankBadge}${customGif}<div style="margin:10px 0;">🐱 ${formatNumber(u.wallet||0)} CATS</div><div>${u.premium ? '👑 Премиум' : ''} ${u.verified ? '✓ Верифицирован' : ''}</div><button onclick="this.closest('.modal').remove()" style="margin-top:15px;">Закрыть</button></div>`; document.body.appendChild(modal); }

function sendMessage() { if(!currentChat) { showNotification("Выберите чат"); return; } let text = document.getElementById('msgInput').value.trim(); if(!text) return; if(currentChatType === 'user') { let key = getKey(currentUser, currentChat); if(!privateChats[key]) privateChats[key]=[]; privateChats[key].push({ id: Date.now() + '_' + Math.random(), sender: currentUser, text, type:'text', time:Date.now() }); localStorage.setItem("BetaMessenger_chats", JSON.stringify(privateChats)); } else { sendGroupMessage(currentChat, text); } document.getElementById('msgInput').value = ''; fullRefresh(); playSound(); }
